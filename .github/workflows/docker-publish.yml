name: Docker Publish

# Canonical image publishing for DojoGenesis/mcp (OCH-132).
# Supersedes the old manually-pushed ghcr.io/dojogenesis/mcpbydojogenesis image
# (the deprecated mirror repo never had CI publishing — do not push it again).
#
# Deployments pin by DIGEST, not :latest — the bridge's 03:00 auto-pull must
# never surprise-deploy a new public surface. Grab the digest from this run's
# output or: docker buildx imagetools inspect ghcr.io/dojogenesis/mcp:<tag>

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dojogenesis/mcp
          labels: |
            io.modelcontextprotocol.server.name=io.github.DojoGenesis/mcp
          tags: |
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}@${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image digest (pin deployments to this)
        run: 'echo "DIGEST: ${{ steps.push.outputs.digest }}"'
